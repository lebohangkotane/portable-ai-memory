<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PAM Memory</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <span class="logo">PAM</span>
    <span class="tagline">Portable AI Memory</span>
    <span id="status-dot" class="dot dot-offline" title="API status"></span>
  </header>

  <section class="stats-bar">
    <span id="mem-count">— memories</span>
    <span id="conv-count">— conversations</span>
  </section>

  <section class="actions">
    <button id="copy-btn" class="btn btn-primary">Copy my context</button>
    <span id="copy-feedback" class="feedback"></span>
  </section>

  <section class="save-section">
    <label for="memory-input">Save a memory</label>
    <textarea
      id="memory-input"
      placeholder="e.g. I prefer concise answers with code examples"
      rows="3"
    ></textarea>
    <div class="row">
      <select id="memory-type">
        <option value="fact">Fact</option>
        <option value="preference" selected>Preference</option>
        <option value="skill">Skill</option>
        <option value="goal">Goal</option>
        <option value="instruction">Instruction</option>
      </select>
      <button id="save-btn" class="btn btn-secondary">Save</button>
    </div>
    <span id="save-feedback" class="feedback"></span>
  </section>

  <footer>
    <span id="api-status">Checking API…</span>
    <span class="version">v0.1.0</span>
  </footer>

  <script src="popup.js"></script>
</body>
</html>
